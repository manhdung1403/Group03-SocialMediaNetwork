<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trang cá nhân | Instagram Style</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Profile Page Styles */
        body {
            background-color: var(--bg-lighter);
            padding-top: 20px;
        }

        .profile-container {
            max-width: 975px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Profile Header Section */
        .profile-header {
            display: flex;
            gap: 50px;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border-light);
        }

        .profile-avatar {
            flex-shrink: 0;
        }

        #avatarImg {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-light);
        }

        .profile-info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
        }

        /* Username and action buttons row */
        .username-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .username-row h1 {
            font-size: 28px;
            font-weight: 200;
            margin: 0;
            color: var(--text-dark);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-buttons button {
            padding: 6px 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-buttons button:hover {
            background-color: var(--primary-blue-hover);
            opacity: 0.9;
        }

        .action-buttons button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        /* Edit profile button */
        #editBtn {
            background-color: var(--bg-white) !important;
            color: var(--text-dark) !important;
            border: 1px solid var(--border-light);
        }

        #editBtn:hover {
            background-color: var(--bg-light) !important;
        }

        /* Follow button for other profiles */
        #followBtn {
            background-color: var(--primary-blue) !important;
            color: white !important;
            border: none !important;
        }

        #followBtn:hover {
            background-color: var(--primary-blue-hover) !important;
        }

        /* Logout button */
        #logoutBtn {
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--border-light);
        }

        #logoutBtn:hover {
            background-color: var(--bg-light);
        }

        /* Stats row */
        #userStats {
            display: flex;
            gap: 40px;
            margin: 10px 0;
        }

        #userStats span {
            font-size: 15px;
            color: var(--text-dark);
        }

        #userStats strong {
            font-weight: 600;
        }

        /* Bio section */
        .bio-section {
            margin-top: 5px;
        }

        #bioText {
            font-size: 15px;
            color: var(--text-dark);
            margin: 0 0 8px 0;
        }

        #dobText {
            font-size: 13px;
            color: var(--text-gray);
            margin: 0;
        }

        /* Tabs Navigation */
        .profile-tabs {
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 0 -20px 50px;
            padding: 0 20px;
        }

        .tab-item {
            position: relative;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 16px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-gray);
            transition: color 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-item:hover {
            color: var(--text-dark);
        }

        .tab-item.active-tab {
            color: var(--text-dark);
            border-bottom-color: var(--text-dark);
        }

        .tab-item i {
            font-size: 14px;
        }

        /* Posts Grid */
        #posts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(293px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #efefef;
            cursor: pointer;
            border-radius: 0;
            transition: transform 0.3s;
        }

        .post-item:hover {
            transform: scale(1.02);
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .post-item:hover img {
            opacity: 0.7;
        }

        .post-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .post-stat i {
            font-size: 18px;
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
            margin: 0;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                gap: 30px;
                text-align: center;
            }

            #avatarImg {
                width: 120px;
                height: 120px;
            }

            .username-row {
                justify-content: center;
                flex-wrap: wrap;
            }

            .username-row h1 {
                font-size: 22px;
                width: 100%;
            }

            .action-buttons {
                justify-content: center;
            }

            #userStats {
                justify-content: center;
            }

            .profile-tabs {
                gap: 30px;
            }

            #posts {
                gap: 3px;
            }

            .tab-item {
                padding: 12px 0;
                font-size: 11px;
            }
        }

        @media (max-width: 600px) {
            .profile-container {
                padding: 0 15px;
            }

            #posts {
                grid-template-columns: 1fr;
                gap: 1px;
            }

            .profile-header {
                padding-bottom: 30px;
            }

            #userStats {
                flex-direction: column;
                gap: 15px;
            }

            .action-buttons button {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <!-- Profile Header -->
        <div class="profile-header">
            <!-- Avatar -->
            <div class="profile-avatar">
                <img id="avatarImg" src="https://via.placeholder.com/160" alt="Profile Avatar" />
            </div>

            <!-- Profile Info -->
            <div class="profile-info-section">
                <!-- Username and Action Buttons -->
                <div class="username-row">
                    <h1 id="displayUsername">...</h1>
                    <div class="action-buttons">
                        <button id="editBtn" style="display:none">Chỉnh sửa trang cá nhân</button>
                        <button id="createPostBtn" style="display:none"><i class="fas fa-plus"></i> Tạo bài
                            đăng</button>
                        <button id="followBtn" style="display:none">Theo dõi</button>
                        <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                    </div>
                </div>

                <!-- Stats -->
                <div id="userStats">
                    <span><strong id="postCount">0</strong> bài viết</span>
                    <span><strong id="followingCount">0</strong> đang theo dõi</span>
                    <span><strong id="followersCount">0</strong> người theo dõi</span>
                </div>

                <!-- Bio -->
                <div class="bio-section">
                    <p id="bioText"></p>
                    <p id="dobText"></p>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="profile-tabs">
            <div class="tab-item active-tab" id="tab-posts">
                <i class="fas fa-th"></i>
                <span>Bài viết</span>
            </div>
            <div class="tab-item" id="tab-likes">
                <i class="fas fa-heart"></i>
                <span>Bài đã tim</span>
            </div>
        </div>

        <!-- Posts Grid -->
        <main id="posts">
            <div class="empty-state">
                <i class="fas fa-image"></i>
                <p>Đang tải bài viết...</p>
            </div>
        </main>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str && str !== 0) return '';
            return String(str).replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
        }

        let allPosts = [];
        let currentUser = null;
        let profileUserId = null;
        let currentTab = 'posts';

        function renderPosts(posts) {
            const postsContainer = document.getElementById('posts');

            if (posts.length === 0) {
                const message = currentTab === 'posts'
                    ? 'Chưa có bài viết nào.'
                    : 'Chưa có bài viết đã tim nào.';
                postsContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>${message}</p>
                    </div>
                `;
                return;
            }

            postsContainer.innerHTML = posts.map(p => {
                const imgSrc = p.image_url ? escapeHtml(p.image_url) : 'https://via.placeholder.com/500?text=No+Image';
                const likeCount = p.like_count || 0;
                const commentCount = p.comment_count || 0;
                return `
                    <div class="post-item">
                        <img src="${imgSrc}" alt="${escapeHtml(p.caption || '')}" title="${escapeHtml(p.caption || '')}" />
                        <div class="post-overlay">
                            <div class="post-stat">
                                <i class="fas fa-heart"></i>
                                <span>${likeCount}</span>
                            </div>
                            <div class="post-stat">
                                <i class="fas fa-comments"></i>
                                <span>${commentCount}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchTab(tabName) {
            currentTab = tabName;

            document.getElementById('tab-posts').classList.remove('active-tab');
            document.getElementById('tab-likes').classList.remove('active-tab');

            if (tabName === 'posts') {
                document.getElementById('tab-posts').classList.add('active-tab');
                const myPosts = allPosts.filter(p => String(p.user_id) === String(currentUser.id));
                document.getElementById('postCount').innerHTML = `<strong>${myPosts.length}</strong> bài viết`;
                renderPosts(myPosts);
            } else if (tabName === 'likes') {
                document.getElementById('tab-likes').classList.add('active-tab');
                const likedPosts = allPosts.filter(p => p.liked_by_current_user === 1);
                document.getElementById('postCount').innerHTML = `<strong>${likedPosts.length}</strong> bài đã tim`;
                renderPosts(likedPosts);
            }
        }

        async function loadProfile() {
            const statusResp = await fetch('/api/auth/status', { credentials: 'include' });
            if (!statusResp.ok) { window.location.href = '/user/login.html'; return; }
            const status = await statusResp.json();
            if (!status.loggedIn) { window.location.href = '/user/login.html'; return; }

            currentUser = status.user;

            const urlParams = new URLSearchParams(window.location.search);
            const targetUserId = urlParams.get('userId');
            const isOwnProfile = !targetUserId || String(targetUserId) === String(currentUser.id);

            const profileUrl = isOwnProfile ? '/api/user/profile' : `/api/users/${encodeURIComponent(targetUserId)}`;

            const profileResp = await fetch(profileUrl, { credentials: 'include' });
            if (!profileResp.ok) {
                console.error('Error loading profile');
                return;
            }
            const userProfile = await profileResp.json();
            profileUserId = userProfile.id;

            document.getElementById('displayUsername').textContent = userProfile.username || currentUser.username;
            document.getElementById('avatarImg').src = userProfile.avatar || 'https://via.placeholder.com/160';

            const bioText = userProfile.bio ? escapeHtml(userProfile.bio) : '(Chưa có bio)';
            document.getElementById('bioText').textContent = bioText;

            const followingCount = typeof userProfile.following_count === 'number' ? userProfile.following_count : 0;
            const followersCount = typeof userProfile.followers_count === 'number' ? userProfile.followers_count : 0;
            document.getElementById('followingCount').innerHTML = `<strong>${followingCount}</strong> đang theo dõi`;
            document.getElementById('followersCount').innerHTML = `<strong>${followersCount}</strong> người theo dõi`;

            if (userProfile.dob) {
                const dob = new Date(userProfile.dob);
                const dobStr = dob.toLocaleDateString('vi-VN');
                document.getElementById('dobText').textContent = `Ngày sinh: ${dobStr}`;
            } else {
                document.getElementById('dobText').textContent = 'Ngày sinh: (Chưa cập nhật)';
            }

            const editBtn = document.getElementById('editBtn');
            const createPostBtn = document.getElementById('createPostBtn');
            const followBtn = document.getElementById('followBtn');

            if (isOwnProfile) {
                editBtn.style.display = 'inline-block';
                createPostBtn.style.display = 'inline-block';
                followBtn.style.display = 'none';
            } else {
                editBtn.style.display = 'none';
                createPostBtn.style.display = 'none';
                followBtn.style.display = 'inline-block';
                followBtn.textContent = userProfile.is_following ? 'Đang theo dõi' : 'Theo dõi';
            }

            const postsResp = await fetch('/api/posts', { credentials: 'include' });
            const postsContainer = document.getElementById('posts');

            if (!postsResp.ok) {
                postsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Lỗi tải dữ liệu.</p></div>';
                return;
            }

            allPosts = await postsResp.json();
            const profileOwnerId = isOwnProfile ? currentUser.id : targetUserId;
            const myPosts = allPosts.filter(p => String(p.user_id) === String(profileOwnerId));

            document.getElementById('postCount').innerHTML = `<strong>${myPosts.length}</strong> bài viết`;
            renderPosts(myPosts);
        }

        document.getElementById('editBtn').addEventListener('click', function () {
            window.location.href = '/user/editprofile.html';
        });

        document.getElementById('followBtn').addEventListener('click', async function () {
            const followBtn = document.getElementById('followBtn');
            const isFollowing = followBtn.textContent.includes('Đang');
            const endpoint = isFollowing ? 'unfollow' : 'follow';

            followBtn.disabled = true;
            try {
                const response = await fetch(`/api/${endpoint}`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: profileUserId })
                });

                if (!response.ok) return;
                followBtn.textContent = isFollowing ? 'Theo dõi' : 'Đang theo dõi';
            } catch (err) {
                console.error('Lỗi khi thay đổi trạng thái theo dõi:', err);
            } finally {
                followBtn.disabled = false;
            }
        });

        document.getElementById('createPostBtn').addEventListener('click', function () {
            window.location.href = '/post/addpost.html';
        });

        document.getElementById('tab-posts').addEventListener('click', function () {
            switchTab('posts');
        });

        document.getElementById('tab-likes').addEventListener('click', function () {
            switchTab('likes');
        });

        document.getElementById('logoutBtn').addEventListener('click', async function () {
            try {
                await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            } catch (e) { }
            window.location.href = '/user/login.html';
        });

        loadProfile().catch(console.error);
    </script>
</body>

</html>
