<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trang cá nhân | Instagram Style</title>
    <style>
        /* Reset & Base */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Header Profile Section */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
            gap: 30px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #eee;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }

        .profile-info {
            flex-grow: 1;
        }

        .username-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .username-row h1 {
            font-size: 28px;
            font-weight: 300;
            margin: 0;
        }

        /* Buttons */
        button {
            background: transparent;
            border: 1px solid #dbdbdb;
            color: #262626;
            padding: 5px 9px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        #logoutBtn {
            color: #ed4956;
            border-color: #ed4956;
        }

        /* Grid System */
        .tabs {
            border-top: 1px solid #dbdbdb;
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 0;
        }

        .tab-item {
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 15px 0;
            border-top: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .tab-item.active-tab {
            border-top: 1px solid #262626;
            color: #262626;
        }

        #posts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #efefef;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .post-item:hover img {
            opacity: 0.8;
            filter: brightness(0.8);
        }

        .post-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            color: white;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .post-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Mobile responsive */
        @media (max-width: 735px) {
            #posts {
                gap: 3px;
            }

            .profile-pic {
                width: 77px;
                height: 77px;
            }

            header {
                gap: 15px;
            }

            .username-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <img id="avatarImg" src="https://via.placeholder.com/150" class="profile-pic" alt="Profile" />

            <section class="profile-info">
                <div class="username-row">
                    <h1 id="displayUsername">...</h1>
                    <button id="editBtn" style="display:none">Chỉnh sửa trang cá nhân</button>
                    <button id="createPostBtn" style="display:none">Tạo bài đăng</button>
                    <button id="followBtn" style="display:none">Theo dõi</button>
                    <button id="logoutBtn">Đăng xuất</button>
                </div>
                <div id="userStats">
                    <span id="postCount"><strong>0</strong> bài viết</span>
                    <span id="followingCount" style="margin-left: 18px;"><strong>0</strong> đang theo dõi</span>
                    <span id="followersCount" style="margin-left: 18px;"><strong>0</strong> người theo dõi</span>
                </div>
                <div id="userBio" style="margin-top: 15px; color: #262626;">
                    <p id="bioText" style="margin: 0 0 5px 0;"></p>
                    <p id="dobText" style="margin: 0; color: #999; font-size: 14px;"></p>
                </div>
            </section>
        </header>

        <div class="tabs">
            <div class="tab-item active-tab" id="tab-posts">
                <span>Bài viết</span>
            </div>
            <div class="tab-item" id="tab-likes">
                <span>Bài đã tim</span>
            </div>
        </div>

        <main id="posts">
            <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #8e8e8e;">
                Đang tải bài viết...
            </div>
        </main>
    </div>

    <script>
        function escapeHtml(str) {
            if (!str && str !== 0) return '';
            return String(str).replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
        }

        let allPosts = [];
        let currentUser = null;
        let profileUserId = null;
        let currentTab = 'posts'; // 'posts' or 'likes'

        function renderPosts(posts) {
            const postsContainer = document.getElementById('posts');

            if (posts.length === 0) {
                const message = currentTab === 'posts'
                    ? 'Chưa có bài viết nào.'
                    : 'Chưa có bài viết đã tim nào.';
                postsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 50px;">${message}</div>`;
                return;
            }

            postsContainer.innerHTML = posts.map(p => {
                const imgSrc = p.image_url ? escapeHtml(p.image_url) : 'https://via.placeholder.com/500?text=No+Image';
                const likeCount = p.like_count || 0;
                const commentCount = p.comment_count || 0;
                return `
                    <div class="post-item">
                        <img src="${imgSrc}" alt="${escapeHtml(p.caption || '')}" title="${escapeHtml(p.caption || '')}" />
                        <div class="post-overlay">
                            <div class="post-stat">
                                <span>❤️</span>
                                <span>${likeCount}</span>
                            </div>
                            <div class="post-stat">
                                <span>💬</span>
                                <span>${commentCount}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchTab(tabName) {
            currentTab = tabName;

            // Update tab styles
            document.getElementById('tab-posts').classList.remove('active-tab');
            document.getElementById('tab-likes').classList.remove('active-tab');

            if (tabName === 'posts') {
                document.getElementById('tab-posts').classList.add('active-tab');
                const myPosts = allPosts.filter(p => String(p.user_id) === String(currentUser.id));
                document.getElementById('postCount').innerHTML = `<strong>${myPosts.length}</strong> bài viết`;
                renderPosts(myPosts);
            } else if (tabName === 'likes') {
                document.getElementById('tab-likes').classList.add('active-tab');
                const likedPosts = allPosts.filter(p => p.liked_by_current_user === 1);
                document.getElementById('postCount').innerHTML = `<strong>${likedPosts.length}</strong> bài đã tim`;
                renderPosts(likedPosts);
            }
        }

        async function loadProfile() {
            const statusResp = await fetch('/api/auth/status', { credentials: 'include' });
            if (!statusResp.ok) { window.location.href = '/user/login.html'; return; }
            const status = await statusResp.json();
            if (!status.loggedIn) { window.location.href = '/user/login.html'; return; }

            currentUser = status.user;

            // Determine which profile to show (self vs another user)
            const urlParams = new URLSearchParams(window.location.search);
            const targetUserId = urlParams.get('userId');
            const isOwnProfile = !targetUserId || String(targetUserId) === String(currentUser.id);

            const profileUrl = isOwnProfile ? '/api/user/profile' : `/api/users/${encodeURIComponent(targetUserId)}`;

            const profileResp = await fetch(profileUrl, { credentials: 'include' });
            if (!profileResp.ok) {
                console.error('Error loading profile');
                return;
            }
            const userProfile = await profileResp.json();
            profileUserId = userProfile.id;

            // Display user info
            document.getElementById('displayUsername').textContent = userProfile.username || currentUser.username;
            document.getElementById('avatarImg').src = userProfile.avatar || 'https://via.placeholder.com/150';

            // Display bio
            const bioText = userProfile.bio ? escapeHtml(userProfile.bio) : '(Chưa có bio)';
            document.getElementById('bioText').textContent = bioText;

            // Display following/followers counts
            const followingCount = typeof userProfile.following_count === 'number' ? userProfile.following_count : 0;
            const followersCount = typeof userProfile.followers_count === 'number' ? userProfile.followers_count : 0;
            document.getElementById('followingCount').innerHTML = `<strong>${followingCount}</strong> đang theo dõi`;
            document.getElementById('followersCount').innerHTML = `<strong>${followersCount}</strong> người theo dõi`;

            // Display date of birth
            if (userProfile.dob) {
                const dob = new Date(userProfile.dob);
                const dobStr = dob.toLocaleDateString('vi-VN');
                document.getElementById('dobText').textContent = `Ngày sinh: ${dobStr}`;
            } else {
                document.getElementById('dobText').textContent = 'Ngày sinh: (Chưa cập nhật)';
            }

            // Show/hide action buttons based on whether it's own profile or another's profile
            const editBtn = document.getElementById('editBtn');
            const createPostBtn = document.getElementById('createPostBtn');
            const followBtn = document.getElementById('followBtn');

            if (isOwnProfile) {
                editBtn.style.display = 'inline-block';
                createPostBtn.style.display = 'inline-block';
                followBtn.style.display = 'none';
            } else {
                editBtn.style.display = 'none';
                createPostBtn.style.display = 'none';
                followBtn.style.display = 'inline-block';
                followBtn.textContent = userProfile.is_following ? 'Đang theo dõi' : 'Theo dõi';
            }

            // Load posts (only show posts for the profile owner)
            const postsResp = await fetch('/api/posts', { credentials: 'include' });
            const postsContainer = document.getElementById('posts');

            if (!postsResp.ok) { postsContainer.innerHTML = '<div>Lỗi tải dữ liệu.</div>'; return; }

            allPosts = await postsResp.json();
            const profileOwnerId = isOwnProfile ? currentUser.id : targetUserId;
            const myPosts = allPosts.filter(p => String(p.user_id) === String(profileOwnerId));

            document.getElementById('postCount').innerHTML = `<strong>${myPosts.length}</strong> bài viết`;
            renderPosts(myPosts);
        }

        document.getElementById('editBtn').addEventListener('click', function () {
            window.location.href = '/user/editprofile.html';
        });

        document.getElementById('followBtn').addEventListener('click', async function () {
            const followBtn = document.getElementById('followBtn');
            const isFollowing = followBtn.textContent.includes('Đang');
            const endpoint = isFollowing ? 'unfollow' : 'follow';

            followBtn.disabled = true;
            try {
                const response = await fetch(`/api/${endpoint}`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: profileUserId })
                });

                if (!response.ok) return;
                followBtn.textContent = isFollowing ? 'Theo dõi' : 'Đang theo dõi';
            } catch (err) {
                console.error('Lỗi khi thay đổi trạng thái theo dõi:', err);
            } finally {
                followBtn.disabled = false;
            }
        });

        document.getElementById('createPostBtn').addEventListener('click', function () {
            window.location.href = '/post/addpost.html';
        });

        document.getElementById('tab-posts').addEventListener('click', function () {
            switchTab('posts');
        });

        document.getElementById('tab-likes').addEventListener('click', function () {
            switchTab('likes');
        });

        document.getElementById('logoutBtn').addEventListener('click', async function () {
            try {
                await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            } catch (e) { }
            window.location.href = '/user/login.html';
        });

        loadProfile().catch(console.error);
    </script>
</body>

</html>
