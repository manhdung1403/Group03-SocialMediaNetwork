<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsFeed</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            padding-bottom: 60px;
        }

        .header {
            display: none;
            /* Ẩn header trên cùng để tránh che nội dung */
        }

        .main-content {
            max-width: 930px;
            margin: 0 auto;
            margin-top: 20px;
            padding: 0 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .feed {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 680px;
        }

        .sidebar {
            width: 260px;
            min-width: 240px;
            position: sticky;
            top: 80px;
            align-self: flex-start;
        }

        .header-content {
            max-width: 950px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            color: #262626;
            letter-spacing: -1px;
        }

        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .main-content {
            width: auto;
            max-width: 930px;
            margin: 90px auto 30px;
            padding: 0 12px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .feed {
            flex: 1 1 auto;
            min-width: 0;
            max-width: 680px;
        }

        .sidebar {
            width: 250px;
            min-width: 230px;
            position: sticky;
            top: 90px;
            align-self: flex-start;
        }

        .sidebar-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 10px;
        }

        .sidebar-card h2 {
            margin: 0 0 6px;
            font-size: 15px;
            font-weight: 700;
            color: #262626;
        }

        .notification-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 8px 0;
            font-size: 13px;
            color: #262626;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-time {
            font-size: 11px;
            color: #8e8e8e;
            margin-top: 2px;
        }

        .notification-fab {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 46px;
            height: 46px;
            border: 1px solid #dbdbdb;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            z-index: 10020;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            font-size: 20px;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            background: #ed4956;
            color: #fff;
            font-size: 11px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-weight: 700;
        }

        .notification-panel {
            position: fixed;
            top: 70px;
            right: 16px;
            width: 340px;
            max-height: 420px;
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
            z-index: 10019;
            display: none;
            overflow: hidden;
        }

        .notification-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #efefef;
            background: #fafafa;
        }

        .notification-panel-body {
            max-height: 360px;
            overflow-y: auto;
            padding: 6px 12px;
        }

        .sidebar-search {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        #sidebarUsersList {
            max-height: 500px;
            overflow-y: auto;
        }

        .user-suggestion {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .user-suggestion:last-child {
            border-bottom: none;
        }

        .user-suggestion .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex: 1;
        }

        .user-suggestion .username {
            font-size: 13px;
            color: #262626;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-suggestion .followers {
            font-size: 11px;
            color: #8e8e8e;
            white-space: nowrap;
        }

        .user-suggestion .avatar {
            width: 36px;
            height: 36px;
            font-size: 16px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            color: #555;
        }

        .user-suggestion .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .user-suggestion .follow-btn {
            padding: 4px 10px;
            font-size: 11px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .post-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #efefef;
        }

        .post-avatar {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            position: relative;
            font-size: 14px;
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #262626;
            text-decoration: none;
        }

        .post-image {
            width: 100%;
            display: block;
        }

        .post-content {
            padding: 12px 16px;
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #efefef;
        }

        .action-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #262626;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            color: var(--primary-blue);
        }

        .likes-count {
            font-size: 13px;
            color: #262626;
            margin-top: 8px;
        }

        .comment-section {
            margin-top: 12px;
            display: none;
        }

        .comment-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 8px;
            max-height: 140px;
            overflow-y: auto;
        }

        .comment-list li {
            background: #f8f8f8;
            border-radius: 4px;
            padding: 6px 10px;
            margin-bottom: 6px;
            font-size: 13px;
            color: #262626;
        }

        .comment-input-row {
            display: flex;
            gap: 6px;
        }

        .comment-input-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 13px;
        }

        .comment-input-row button {
            padding: 8px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            background-color: #0095f6;
            color: white;
            cursor: pointer;
        }

        .comment-input-row button:hover {
            background-color: #1877f2;
        }

        .post-caption {
            font-size: 14px;
            color: #262626;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .post-caption .username {
            font-weight: 600;
            margin-right: 4px;
        }

        .post-time {
            font-size: 12px;
            color: #8e8e8e;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-top: 40px;
        }

        .login-prompt h2 {
            color: #262626;
            margin-bottom: 16px;
            font-size: 22px;
            font-weight: 300;
        }

        .login-prompt p {
            color: #8e8e8e;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .chat-unread-badge {
            background: #ed4956;
            color: #fff;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e8e;
            font-size: 14px;
        }

        /* Edit Modal Styles */
        .edit-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .edit-modal {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .edit-modal h2 {
            margin: 0;
            font-size: 20px;
            color: var(--text-dark, #262626);
        }

        .edit-modal textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid var(--border-light, #dbdbdb);
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            font-size: 14px;
        }

        .edit-modal textarea:focus {
            outline: none;
            border-color: var(--primary-blue, #0095f6);
        }

        .edit-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .edit-modal-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .edit-modal-cancel {
            background-color: transparent;
            color: var(--text-dark, #262626);
            border: 1px solid var(--border-light, #dbdbdb) !important;
        }

        .edit-modal-cancel:hover {
            background-color: var(--bg-light, #fafafa);
        }

        .edit-modal-save {
            background-color: var(--primary-blue, #0095f6);
            color: white;
        }

        .edit-modal-save:hover {
            background-color: #1877f2;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-content">
            <div class="logo" onclick="window.location.href='/post/post.html'">NewsFeed</div>
            <div id="authButtons" class="auth-buttons">
                <!-- Nút đăng nhập và đăng ký sẽ được thêm vào đây khi chưa đăng nhập -->
            </div>
            <div id="userInfo" class="user-info" style="display: none;">
                <span class="username" id="usernameDisplay"></span>
                <a class="btn btn-profile" id="addPostLink" href="#" style="display: none;">Tạo bài đăng</a>
                <a class="btn btn-profile" id="profileLink" href="#" style="display: none;">Trang cá nhân</a>

                <!-- Thêm 2 link mới -->
                <a class="btn btn-profile" href="/friends.html">Bạn bè</a>
                <a class="btn btn-profile" href="/chat.html">
                    Nhắn tin <span id="chatUnreadBadge" class="chat-unread-badge" style="display:none;">0</span>
                </a>

                <button class="btn btn-logout icon-btn" id="logoutBtn" title="Đăng xuất" aria-label="Đăng xuất">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H9c-1.1 0-2 .9-2 2v4h2V5h10v14H9v-4H7v4c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <nav class="vertical-nav" aria-label="Điều hướng chính">
        <a href="/post/post.html" class="active">🏠 Bài đăng</a>
        <a href="/user/profile.html">👤 Trang cá nhân</a>
        <a href="/friends.html">👥 Bạn bè</a>
        <a href="/chat.html">💬 Tin nhắn</a>
        <a href="/post/addpost.html">✍️ Tạo bài đăng</a>
    </nav>

    <button id="notificationFab" class="notification-fab" type="button" title="Thông báo" aria-label="Thông báo">
        🔔
        <span id="notificationBadge" class="notification-badge">0</span>
    </button>
    <div id="notificationPanel" class="notification-panel">
        <div class="notification-panel-header">
            <h2 style="margin:0; font-size:16px;">Thông báo</h2>
            <button id="markNotificationsReadBtn" class="btn" style="padding: 4px 8px; font-size: 11px;">Đã đọc</button>
        </div>
        <div id="notificationsList" class="notification-panel-body">
            <p style="color: #8e8e8e; margin: 8px 0;">Đang tải...</p>
        </div>
    </div>

    <div class="main-content content-with-nav">
        <div class="feed" id="postContainer">
            <p style="text-align: center; padding: 40px; color: #8e8e8e;">Đang kiểm tra đăng nhập...</p>
        </div>
        <aside class="sidebar">
            <div class="sidebar-card">
                <h2>Gợi ý người dùng</h2>
                <input id="userSearchInput" class="sidebar-search" type="text" placeholder="Tìm kiếm người dùng..." />
                <div id="sidebarUsersList">
                    <p style="color: #8e8e8e; margin: 8px 0;">Đang tải...</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Edit Post Modal -->
    <div class="edit-modal-overlay" id="editPostModalFeed">
        <div class="edit-modal">
            <h2>Chỉnh sửa bài viết</h2>
            <textarea id="editPostCaptionFeed" placeholder="Nhập nội dung mới..."></textarea>
            <div class="edit-modal-actions">
                <button class="edit-modal-cancel" id="cancelEditBtnFeed">Hủy</button>
                <button class="edit-modal-save" id="saveEditBtnFeed">Lưu thay đổi</button>
            </div>
        </div>
    </div>

    <!-- Delete Comment Modal -->
    <div class="edit-modal-overlay" id="deleteCommentModal">
        <div class="edit-modal"
            style="max-width: 350px; text-align: center; gap: 8px; padding: 24px 0 0 0; overflow: hidden;">
            <h2 style="font-size: 18px; margin: 0 24px 8px;">Xóa bình luận?</h2>
            <p style="color: #8e8e8e; font-size: 14px; margin: 0 24px 16px;">Bạn có chắc chắn muốn xóa bình luận này
                không?</p>
            <div style="display: flex; flex-direction: column; border-top: 1px solid #dbdbdb;">
                <button id="confirmDeleteCommentBtn"
                    style="background: transparent; color: #ed4956; border: none; font-weight: 700; padding: 14px; cursor: pointer; border-bottom: 1px solid #dbdbdb; border-radius: 0; font-size: 14px;">Xóa</button>
                <button id="cancelDeleteCommentBtn"
                    style="background: transparent; color: #262626; border: none; font-weight: normal; padding: 14px; cursor: pointer; border-radius: 0; font-size: 14px;">Hủy</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div class="edit-modal-overlay" id="imageViewerModal"
        style="display: none; align-items: center; justify-content: center; z-index: 10000; cursor: pointer;">
        <img id="imageViewerImg" src=""
            style="max-width: 90%; max-height: 90vh; object-fit: contain; border-radius: 4px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); cursor: default;" />
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let isLoggedIn = false;
        let currentUser = null;
        let notificationSocket = null;

        function escapeHtml(str) {
            if (!str && str !== 0) return '';
            return String(str).replace(/[&<>\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
        }

        // Lấy base URL
        const baseUrl = window.location.origin === 'http://127.0.0.1:5500' || window.location.protocol === 'file:'
            ? 'http://localhost:3000'
            : window.location.origin;

        // --- CÁC HÀM XỬ LÝ THEO YÊU CẦU ---
        
        // 3. Đánh dấu đã đọc khi người dùng mở xem thông báo
        async function markRead() {
            // Gọi API: router.put('/api/notifications/read-all', ...)
            await fetch('/api/notifications/read-all', { method: 'PUT' });
            const badge = document.getElementById('badge');
            if (badge) badge.style.display = 'none'; // Ẩn chấm đỏ
        }

        // Hàm xử lý khi người dùng nhấn nút thay đổi quyền riêng tư của bài viết
        async function togglePostPrivacy(postId) {
            // Gọi API đã định nghĩa ở Backend: router.put('/api/posts/:id/privacy', ...)
            const res = await fetch(`/api/posts/${postId}/privacy`, { 
                method: 'PUT' 
            });
            const data = await res.json(); // Chờ phản hồi từ PostService trả về

            if (data.success) {
                // data.is_private trả về giá trị 0 (công khai) hoặc 1 (riêng tư)
                alert(data.message);
                if (typeof renderPostStatus !== 'undefined') renderPostStatus(postId, data.is_private); 
            } else {
                alert(data.error); // Hiển thị lỗi nếu không phải chủ bài viết
            }
        }

        async function handleLikePost(postId) {
            // Gọi API: router.post('/api/posts/:id/like', ...)
            const res = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
            const result = await res.json(); // Nhận { liked, like_count, ... } từ postModel

            if (result.success) {
                // Cập nhật màu nút tim: result.liked = true thì đỏ, false thì xám
                const likeBtn = document.querySelector(`#like-btn-${postId}`);
                if (likeBtn) likeBtn.classList.toggle('text-danger', result.liked);
                
                // Cập nhật con số hiển thị số lượt tim
                const countEl = document.querySelector(`#like-count-${postId}`);
                if (countEl) countEl.innerText = result.like_count;
            }
        }

        async function handleLikeComment(postId, commentId) {
            // Gọi API: router.post('/api/posts/:id/comments/:commentId/like', ...)
            const res = await fetch(`/api/posts/${postId}/comments/${commentId}/like`, { method: 'POST' });
            const result = await res.json();

            if (result.success) {
                // Cập nhật giao diện riêng cho dòng comment đó
                if (typeof updateCommentUI !== 'undefined') updateCommentUI(commentId, result.liked, result.like_count);
            }
        }

        async function deleteComment(commentId) {
            if (!confirm("Bạn có muốn xóa bình luận này?")) return;

            // Gọi API: router.delete('/api/comments/:commentId', ...)
            const res = await fetch(`/api/comments/${commentId}`, { method: 'DELETE' });
            const result = await res.json();

            if (result.success) {
                // Nếu xóa thành công trong DB, xóa luôn phần tử HTML tương ứng trên trang
                const el = document.getElementById(`comment-item-${commentId}`);
                if (el) el.remove();
            } else {
                alert(result.error); // Báo lỗi nếu user không có quyền xóa
            }
        }

        async function editPost(postId, newCaption) {
            // Gọi API: router.put('/api/posts/:id', ...)
            const res = await fetch(`/api/posts/${postId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ caption: newCaption }) // Gửi nội dung mới lên postController
            });
            const result = await res.json();

            if (result.success) {
                // Cập nhật nội dung văn bản mới hiển thị trên màn hình
                const captionEl = document.querySelector(`#post-caption-${postId}`);
                if (captionEl) captionEl.innerText = newCaption;
                if (typeof toggleEditMode !== 'undefined') toggleEditMode(postId, false); // Tắt chế độ nhập liệu
            }
        }
        
        // ---------------------------------

        // Kiểm tra trạng thái đăng nhập
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${baseUrl}/api/auth/status`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.loggedIn) {
                    isLoggedIn = true;
                    currentUser = data.user;
                    updateUIForLoggedIn();
                    initNotificationSocket();
                    loadChatUnreadBadge();
                    fetchPosts();
                    fetchSuggestedUsers();
                    loadNotifications();
                } else {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi kiểm tra đăng nhập:", error);
                updateUIForLoggedOut();
            }
        }

        // Cập nhật UI khi đã đăng nhập
        function updateUIForLoggedIn() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const usernameDisplay = document.getElementById('usernameDisplay');
            const profileLink = document.getElementById('profileLink');

            authButtons.style.display = 'none';
            userInfo.style.display = 'flex';
            usernameDisplay.textContent = currentUser.username;
            profileLink.href = `${baseUrl}/user/profile.html`;
            profileLink.style.display = 'inline-block';
            addPostLink.href = `${baseUrl}/post/addpost.html`;
            addPostLink.style.display = 'inline-block';
        }

        // Cập nhật UI khi chưa đăng nhập
        function updateUIForLoggedOut() {
            const authButtons = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const postContainer = document.getElementById('postContainer');
            const profileLink = document.getElementById('profileLink');

            authButtons.style.display = 'flex';
            authButtons.innerHTML = `
                <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
            `;
            userInfo.style.display = 'none';
            if (profileLink) profileLink.style.display = 'none';
            if (addPostLink) addPostLink.style.display = 'none';

            // Hiển thị thông báo yêu cầu đăng nhập
            postContainer.innerHTML = `
                <div class="login-prompt">
                    <h2>Đăng nhập để xem bài đăng</h2>
                    <p>Đăng nhập để xem ảnh và video từ bạn bè.</p>
                    <div class="auth-buttons" style="justify-content: center;">
                        <a href="${baseUrl}/user/login.html" class="btn btn-login">Đăng nhập</a>
                        <a href="${baseUrl}/user/register.html" class="btn btn-register">Đăng ký</a>
                    </div>
                </div>
            `;
        }

        function initNotificationSocket() {
            if (notificationSocket) notificationSocket.disconnect();
            if (!currentUser || !currentUser.id) return;
            try {
                notificationSocket = io(baseUrl, { withCredentials: true });
                notificationSocket.emit('register', currentUser.id);
                // 1. Lắng nghe sự kiện thông báo mới từ Server qua Socket.io
                notificationSocket.on('unread_badge_update', () => {
                    // Hàm này được gọi khi Server phát tín hiệu có tương tác mới
                    loadChatUnreadBadge(); // Cập nhật chấm đỏ trên icon chuông thông báo
                });
            } catch (e) { notificationSocket = null; }
        }

        async function loadChatUnreadBadge() {
            try {
                const badge = document.getElementById('chatUnreadBadge');
                if (!badge) return;
                // Show temporarily while loading
                badge.style.display = 'inline-flex';
                badge.textContent = '...';

                const r = await fetch(`${baseUrl}/api/conversations/unread-total`, {
                    credentials: 'include'
                });
                if (!r.ok) {
                    badge.style.display = 'none';
                    return;
                }

                const data = await r.json();
                const count = Number(data.unreadCount) || 0;
                if (count > 0) {
                    badge.textContent = String(count);
                    badge.style.display = 'inline-flex';
                } else {
                    badge.style.display = 'none';
                }
            } catch {
                const badge = document.getElementById('chatUnreadBadge');
                if (badge) badge.style.display = 'none';
            }
        }

        // Lấy danh sách bài đăng
        async function fetchPosts() {
            if (!isLoggedIn) {
                return;
            }

            try {
                const response = await fetch(`${baseUrl}/api/posts`, {
                    credentials: 'include'
                });

                if (response.status === 401) {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                    return;
                }

                const posts = await response.json();

                const container = document.getElementById('postContainer');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state">Chưa có bài đăng nào.</div>';
                    return;
                }

                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post-card';

                    const username = post.username || 'User #' + post.user_id;
                    const avatarInitial = username.charAt(0).toUpperCase();
                    const timeAgo = getTimeAgo(new Date(post.created_at));

                    const isFollowing = !!post.is_following;
                    const isOwnPost = String(post.user_id) === String(currentUser.id);

                    const likeCount = typeof post.like_count === 'number' ? post.like_count : 0;
                    const liked = !!post.liked_by_current_user;
                    const likedClass = liked ? 'liked' : '';
                    const likeLabel = liked ? '💖 Đã thả tim' : '🤍 Thả tim';

                    postElement.innerHTML = `
                        <div class="post-header">
                            <div class="post-avatar">
                                ${post.user_avatar ? `<img src="${post.user_avatar}" alt="${username} avatar">` : avatarInitial}
                            </div>
                            <a class="post-username" href="/user/profile.html?userId=${post.user_id}">${username}</a>
                            ${!isOwnPost ? `<button class="follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${post.user_id}">${isFollowing ? 'Đang theo dõi' : 'Theo dõi'}</button>` : ''}
                        </div>
                        ${post.image_url ? `<img src="${post.image_url}" alt="Post image" class="post-image" style="cursor: pointer;">` : ''}
                        <div class="post-content">
                            ${post.caption ? `
                                <div class="post-caption">
                                    <span class="username">${username}</span>
                                    ${post.caption}
                                </div>
                            ` : ''}
                            <div class="post-actions">
                                <button class="action-btn like-btn ${likedClass}" data-post-id="${post.id}">${likeLabel}</button>
                                <button class="action-btn comment-toggle-btn" data-post-id="${post.id}">💬 Bình luận</button>
                            </div>
                            <div class="likes-count" id="likes-count-${post.id}">${likeCount} lượt thích</div>
                            <div class="comment-section" id="comment-section-${post.id}">
                                <ul class="comment-list" id="comment-list-${post.id}"></ul>
                                <div class="comment-input-row">
                                    <input type="text" placeholder="Viết bình luận..." id="comment-input-${post.id}">
                                    <button type="button" class="comment-submit-btn" data-post-id="${post.id}">Gửi</button>
                                </div>
                            </div>
                            <div class="post-time">${timeAgo}</div>
                        </div>
                    `;
                    container.appendChild(postElement);
                });
            } catch (error) {
                console.error("Lỗi khi lấy dữ liệu:", error);
                document.getElementById('postContainer').innerHTML = `<div class="empty-state" style="color: #ed4956;">Không thể kết nối với server.<br><small style='color:#b00;'>${escapeHtml(error.message || String(error))}</small></div>`;
            }
        }

        async function fetchSuggestedUsers(search = '') {
            if (!isLoggedIn) return;

            try {
                const searchQuery = search ? `?search=${encodeURIComponent(search)}` : '';
                const response = await fetch(`${baseUrl}/api/users${searchQuery}`, {
                    credentials: 'include'
                });

                if (response.status === 401) {
                    isLoggedIn = false;
                    updateUIForLoggedOut();
                    return;
                }

                const users = await response.json();
                renderSuggestedUsers(users);
            } catch (error) {
                console.error('Lỗi khi tải danh sách người dùng:', error);
                const list = document.getElementById('sidebarUsersList');
                if (list) list.innerHTML = '<p class="empty-state">Không thể tải danh sách người dùng.</p>';
            }
        }

        // 2. Hàm lấy danh sách thông báo và hiển thị
        async function loadNotifications() {
            if (!isLoggedIn) return;
            const list = document.getElementById('notificationsList');
            if (!list) return;
            try {
                // Gọi API: router.get('/api/notifications', ...)
                const response = await fetch(`${baseUrl}/api/notifications`, {
                    credentials: 'include'
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Lỗi API thông báo:', response.status, errorText);
                    list.innerHTML = '<p class="empty-state">Không thể tải thông báo.</p>';
                    return;
                }
                const data = await response.json();
                const notifications = Array.isArray(data.notifications) ? data.notifications : [];
                const unreadCount = notifications.filter(n => !n.is_read).length;
                const badge = document.getElementById('notificationBadge');
                if (badge) {
                    if (unreadCount > 0) {
                        badge.textContent = unreadCount > 99 ? '99+' : String(unreadCount);
                        badge.style.display = 'inline-flex';
                    } else {
                        badge.style.display = 'none';
                    }
                }
                if (!notifications.length) {
                    list.innerHTML = '<p class="empty-state" style="padding:12px 0;">Chưa có thông báo.</p>';
                    return;
                }
                // Hiển thị danh sách lên giao diện
                list.innerHTML = notifications.map(n => `
                    <div class="notification-item" data-post-id="${n.post_id || ''}" data-user-id="${n.actor_id || ''}" style="${n.is_read ? 'opacity:0.7;' : 'font-weight:600;'} cursor: pointer;">
                        <div>${escapeHtml(n.message || '')}</div>
                        <div class="notification-time">${getTimeAgo(new Date(n.created_at))}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Lỗi tải thông báo:', err);
                list.innerHTML = '<p class="empty-state">Không thể tải thông báo.</p>';
            }
        }

        function renderSuggestedUsers(users) {
            const list = document.getElementById('sidebarUsersList');
            if (!list) return;

            if (!Array.isArray(users) || users.length === 0) {
                list.innerHTML = '<p class="empty-state">Không tìm thấy người dùng.</p>';
                return;
            }

            list.innerHTML = users.map(user => {
                const username = user.username || `User #${user.id}`;
                const avatarInitial = username.charAt(0).toUpperCase();
                const isFollowing = !!user.is_following;
                const followersCount = typeof user.followers_count === 'number' ? user.followers_count : 0;

                let avatarUrl = null;
                if (user.avatar) {
                    const trimmedAvatar = String(user.avatar).trim();
                    if (trimmedAvatar.startsWith('http://') || trimmedAvatar.startsWith('https://')) {
                        avatarUrl = trimmedAvatar;
                    } else if (trimmedAvatar.startsWith('/')) {
                        avatarUrl = `${baseUrl}${trimmedAvatar}`;
                    } else {
                        avatarUrl = `${baseUrl}/${trimmedAvatar}`;
                    }
                }

                return `
                    <div class="user-suggestion" data-user-id="${user.id}">
                        <div class="user-info">
                            <div class="avatar">${avatarUrl ? `<img src="${avatarUrl}" alt="${username} avatar">` : avatarInitial}</div>
                            <div>
                                <a href="/user/profile.html?userId=${user.id}" class="username">${username}</a>
                                <div class="followers">${followersCount} người theo dõi</div>
                            </div>
                        </div>
                        <button class="btn follow-btn ${isFollowing ? 'following' : ''}" data-user-id="${user.id}">${isFollowing ? 'Đang theo dõi' : 'Theo dõi'}</button>
                    </div>
                `;
            }).join('');
        }

        // Tính thời gian đã trôi qua
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days} ngày trước`;
            if (hours > 0) return `${hours} giờ trước`;
            if (minutes > 0) return `${minutes} phút trước`;
            return 'Vừa xong';
        }

        const commentsCache = new Map();

        async function fetchComments(postId) {
            const response = await fetch(`${baseUrl}/api/posts/${postId}/comments`, {
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Không thể tải bình luận');
            const data = await response.json();
            if (!data.success) throw new Error(data.error || 'Không thể tải bình luận');
            const comments = Array.isArray(data.comments) ? data.comments : [];
            commentsCache.set(String(postId), comments);
            return comments;
        }

        function getCommentsState(postId) {
            return commentsCache.get(String(postId)) || [];
        }

        function renderComments(postId, comments) {
            const list = document.getElementById(`comment-list-${postId}`);
            if (!list) return;

            list.innerHTML = comments.map(comment => {
                const safeText = String(comment.content || comment.text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');

                const likeLabel = comment.liked ? '💖' : '🤍';
                const canDelete = currentUser && String(comment.user_id) === String(currentUser.id);
                return `
                    <li data-comment-id="${comment.id}" style="display: flex; justify-content: space-between; align-items: start;">
                        <span style="flex: 1;">${safeText}</span>
                        <div style="display: flex; gap: 8px;">
                            <button type="button" class="action-btn comment-like-btn" data-post-id="${postId}" data-comment-id="${comment.id}">
                                ${likeLabel} ${comment.likes}
                            </button>
                            <button type="button" class="action-btn comment-delete-btn" data-post-id="${postId}" data-comment-id="${comment.id}" style="color: #ed4956; display: ${canDelete ? 'inline-flex' : 'none'};">
                                Xóa
                            </button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        let currentEditPostIdFeed = null;
        let pendingDeleteComment = { postId: null, commentId: null };

        document.getElementById('cancelEditBtnFeed').addEventListener('click', () => {
            document.getElementById('editPostModalFeed').style.display = 'none';
            currentEditPostIdFeed = null;
        });

        document.getElementById('saveEditBtnFeed').addEventListener('click', async () => {
            if (!currentEditPostIdFeed) return;
            const newCaption = document.getElementById('editPostCaptionFeed').value;

            try {
                const response = await fetch(`${baseUrl}/api/posts/${currentEditPostIdFeed}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ caption: newCaption }),
                    credentials: 'include'
                });
                const data = await response.json();
                if (data.success) {
                    fetchPosts();
                    document.getElementById('editPostModalFeed').style.display = 'none';
                    currentEditPostIdFeed = null;
                } else {
                    alert('Lỗi: ' + data.error);
                }
            } catch (err) {
                console.error('Lỗi khi sửa bài:', err);
            }
        });

        document.addEventListener('click', async (e) => {
            if (e.target.id === 'imageViewerModal') {
                document.getElementById('imageViewerModal').style.display = 'none';
                return;
            }

            if (e.target.classList.contains('post-image')) {
                const src = e.target.getAttribute('src');
                if (src) {
                    document.getElementById('imageViewerImg').src = src;
                    document.getElementById('imageViewerModal').style.display = 'flex';
                }
                return;
            }

            if (e.target.id === 'editPostModalFeed') {
                document.getElementById('editPostModalFeed').style.display = 'none';
                currentEditPostIdFeed = null;
                return;
            }

            if (e.target.id === 'deleteCommentModal' || e.target.id === 'cancelDeleteCommentBtn') {
                document.getElementById('deleteCommentModal').style.display = 'none';
                pendingDeleteComment = { postId: null, commentId: null };
                return;
            }

            if (e.target.id === 'confirmDeleteCommentBtn') {
                const { postId, commentId } = pendingDeleteComment;
                if (postId && commentId) {
                    try {
                        const response = await fetch(`${baseUrl}/api/comments/${commentId}`, {
                            method: 'DELETE',
                            credentials: 'include'
                        });
                        const data = await response.json();
                        if (response.ok && data.success) {
                            const comments = await fetchComments(postId);
                            renderComments(postId, comments);
                        } else {
                            console.error('Lỗi xóa bình luận:', data);
                        }
                    } catch (err) {
                        console.error('Lỗi xóa bình luận:', err);
                    }
                }
                document.getElementById('deleteCommentModal').style.display = 'none';
                pendingDeleteComment = { postId: null, commentId: null };
                return;
            }

            const likeBtn = e.target.closest('.like-btn');
            const commentToggleBtn = e.target.closest('.comment-toggle-btn');
            const commentSubmitBtn = e.target.closest('.comment-submit-btn');
            const editBtn = e.target.closest('.edit-post-btn');
            const commentDeleteBtn = e.target.closest('.comment-delete-btn');

            if (editBtn) {
                const postId = editBtn.getAttribute('data-post-id');
                const oldCaption = decodeURIComponent(editBtn.getAttribute('data-caption'));
                currentEditPostIdFeed = postId;
                document.getElementById('editPostCaptionFeed').value = oldCaption;
                document.getElementById('editPostModalFeed').style.display = 'flex';
                document.getElementById('editPostCaptionFeed').focus();
                return;
            }

            if (likeBtn) {
                const postId = likeBtn.getAttribute('data-post-id');

                try {
                    likeBtn.disabled = true;
                    likeBtn.style.cursor = 'wait';

                    const response = await fetch(`${baseUrl}/api/posts/${postId}/like`, {
                        method: 'POST',
                        credentials: 'include'
                    });

                    if (response.status === 401) {
                        isLoggedIn = false;
                        updateUIForLoggedOut();
                        return;
                    }

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi tim bài viết:', data);
                    } else {
                        const liked = !!data.liked;
                        const likeCount = typeof data.like_count === 'number' ? data.like_count : 0;

                        const likesCountElem = document.getElementById(`likes-count-${postId}`);
                        if (likesCountElem) likesCountElem.textContent = `${likeCount} lượt thích`;

                        likeBtn.textContent = liked ? '💖 Đã thả tim' : '🤍 Thả tim';
                        if (liked) loadNotifications();
                    }
                } catch (err) {
                    console.error('Lỗi kết nối khi tim:', err);
                } finally {
                    likeBtn.disabled = false;
                    likeBtn.style.cursor = 'pointer';
                }

                return;
            }

            const followBtn = e.target.closest('.follow-btn');
            if (followBtn) {
                const userId = followBtn.getAttribute('data-user-id');
                const isFollowing = followBtn.classList.contains('following');
                const endpoint = isFollowing ? 'unfollow' : 'follow';

                try {
                    followBtn.disabled = true;
                    const response = await fetch(`${baseUrl}/api/${endpoint}`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId })
                    });

                    if (response.status === 401) {
                        isLoggedIn = false;
                        updateUIForLoggedOut();
                        return;
                    }

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi khi thay đổi trạng thái theo dõi:', data);
                    } else {
                        followBtn.classList.toggle('following', !isFollowing);
                        followBtn.textContent = !isFollowing ? 'Đang theo dõi' : 'Theo dõi';
                    }
                } catch (err) {
                    console.error('Lỗi khi thay đổi trạng thái theo dõi:', err);
                } finally {
                    followBtn.disabled = false;
                }

                return;
            }

            const commentLikeBtn = e.target.closest('.comment-like-btn');
            if (commentLikeBtn) {
                const postId = commentLikeBtn.getAttribute('data-post-id');
                const commentId = commentLikeBtn.getAttribute('data-comment-id');
                try {
                    const response = await fetch(`${baseUrl}/api/posts/${postId}/comments/${commentId}/like`, {
                        method: 'POST',
                        credentials: 'include'
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi tim bình luận:', data);
                        return;
                    }
                    const comments = await fetchComments(postId);
                    renderComments(postId, comments);
                    if (data.liked) loadNotifications();
                } catch (err) {
                    console.error('Lỗi tim bình luận:', err);
                }
                return;
            }

            if (commentToggleBtn) {
                const postId = commentToggleBtn.getAttribute('data-post-id');
                const section = document.getElementById(`comment-section-${postId}`);
                if (section) {
                    section.style.display = section.style.display === 'block' ? 'none' : 'block';
                    if (section.style.display === 'block') {
                        try {
                            const comments = await fetchComments(postId);
                            renderComments(postId, comments);
                        } catch (err) {
                            console.error('Lỗi tải bình luận:', err);
                        }
                    }
                }
                return;
            }

            if (commentDeleteBtn) {
                const postId = commentDeleteBtn.getAttribute('data-post-id');
                const commentId = commentDeleteBtn.getAttribute('data-comment-id');
                pendingDeleteComment = { postId, commentId };
                document.getElementById('deleteCommentModal').style.display = 'flex';
                return;
            }

            if (commentSubmitBtn) {
                const postId = commentSubmitBtn.getAttribute('data-post-id');
                const input = document.getElementById(`comment-input-${postId}`);
                if (!input || !input.value.trim()) return;

                const commentText = input.value.trim();
                try {
                    const response = await fetch(`${baseUrl}/api/posts/${postId}/comments`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: commentText })
                    });
                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        console.error('Lỗi gửi bình luận:', data);
                        return;
                    }
                    const comments = await fetchComments(postId);
                    renderComments(postId, comments);
                    loadNotifications();
                    input.value = '';
                } catch (err) {
                    console.error('Lỗi gửi bình luận:', err);
                }

                return;
            }

            // Chức năng: Điều hướng khi bấm vào một dòng thông báo
            const notificationItem = e.target.closest('.notification-item');
            if (notificationItem) {
                // Lấy thông tin ID bài viết và ID user được nhúng sẵn trên chuỗi HTML khi render
                const postId = notificationItem.getAttribute('data-post-id');
                const userId = notificationItem.getAttribute('data-user-id');

                if (postId) {
                    // Nếu thông báo liên quan đến Post (Like, Comment), tìm thẻ HTML của bài viết đó trên màn hình
                    const postElement = document.querySelector(`.like-btn[data-post-id="${postId}"]`)?.closest('.post-card');
                    if (postElement) {
                        // Tự động sử dụng API của trình duyệt cuộn thanh cuộn mượt mà trỏ đúng vào component của bài viết
                        postElement.scrollIntoView({ behavior: 'smooth', block: 'center' });

                        // Tạo hiệu ứng chớp tắt màn hình để người dùng biết là bài đó: (Đổi Background xanh nhạt rồi quay lại trắng sau 2s)
                        postElement.style.transition = 'background-color 0.5s';
                        postElement.style.backgroundColor = '#f0f8ff'; // highlight light blue
                        setTimeout(() => { postElement.style.backgroundColor = 'white'; }, 2000);
                    }
                } else if (userId) {
                    // Nếu chỉ liên quan user (Ví dụ thông báo follow), chuyển URL tới profile của User đó
                    window.location.href = '/user/profile.html?userId=' + userId;
                }
                
                // Thu gọn danh sách thông báo lại sau khi người dùng bấm xong
                const notificationPanel = document.getElementById('notificationPanel');
                if (notificationPanel) notificationPanel.style.display = 'none';
                return;
            }
        });

        // Xử lý đăng xuất
        async function handleLogout() {
            try {
                const response = await fetch(`${baseUrl}/api/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    isLoggedIn = false;
                    currentUser = null;
                    updateUIForLoggedOut();
                }
            } catch (error) {
                console.error("Lỗi khi đăng xuất:", error);
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();

            const searchInput = document.getElementById('userSearchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value.trim();
                    fetchSuggestedUsers(query);
                });
            }

            const markReadBtn = document.getElementById('markNotificationsReadBtn');
            if (markReadBtn) {
                markReadBtn.addEventListener('click', async () => {
                    try {
                        await fetch(`${baseUrl}/api/notifications/read-all`, {
                            method: 'PUT',
                            credentials: 'include'
                        });
                        loadNotifications();
                    } catch (err) {
                        console.error('Lỗi đánh dấu đã đọc:', err);
                    }
                });
            }

            const notificationFab = document.getElementById('notificationFab');
            const notificationPanel = document.getElementById('notificationPanel');
            if (notificationFab && notificationPanel) {
                // Sự kiện: Khi bấm vào biểu tượng "Quả chuông"
                notificationFab.addEventListener('click', async (e) => {
                    e.stopPropagation(); // Ngăn sự kiện click nổi bọt tắt popup ngay lập tức
                    
                    const opening = notificationPanel.style.display !== 'block'; // Kiểm tra panel đang đóng hay mở
                    notificationPanel.style.display = opening ? 'block' : 'none'; // Toggle ẩn/hiện
                    
                    if (opening) {
                        // Gọi báo API load dữ liệu notification mới nhất
                        await loadNotifications();
                        
                        // Gọi API đánh dấu đã đọc toàn bộ (read-all) ngay lập tức và ẩn thẻ chấm đỏ (Badge) của biểu tượng
                        const badge = document.getElementById('notificationBadge');
                        if (badge) badge.style.display = 'none'; // Xóa ngay chấm đỏ của badge
                        
                        try {
                            // Gọi backend báo update Database
                            await fetch(`${baseUrl}/api/notifications/read-all`, {
                                method: 'PUT',
                                credentials: 'include'
                            });
                        } catch (err) {
                            console.error('Lỗi tự động đánh dấu đã đọc:', err);
                        }
                    }
                });

                notificationPanel.addEventListener('click', (e) => e.stopPropagation());

                document.addEventListener('click', () => {
                    notificationPanel.style.display = 'none';
                });
            }

            // Cập nhật badge khi chuyển tab về trang post (vd: từ chat quay lại)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && isLoggedIn) {
                    loadChatUnreadBadge();
                    loadNotifications();
                }
            });

            setInterval(() => {
                if (isLoggedIn) loadNotifications();
            }, 15000);

            document.addEventListener('click', (e) => {
                if (e.target.id === 'logoutBtn') {
                    handleLogout();
                }
            });
        });
    </script>
</body>

</html>
