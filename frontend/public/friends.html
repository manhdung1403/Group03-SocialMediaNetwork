<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mọi người - NewsFeed</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #fafafa;
            color: #262626;
            margin: 0;
            padding: 0;
        }

        .page-header {
            position: sticky;
            top: 0;
            background: #fff;
            border-bottom: 1px solid #dbdbdb;
            padding: 14px 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .page-header h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0;
            color: #262626;
            white-space: nowrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        .search-wrap i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 13px;
        }

        #searchInput {
            width: 100%;
            padding: 8px 12px 8px 32px;
            background: #efefef;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            color: #262626;
            outline: none;
        }

        #searchInput::placeholder {
            color: #8e8e8e;
        }

        #searchInput:focus {
            background: #e8e8e8;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #8e8e8e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #dbdbdb;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            overflow: hidden;
        }

        .user-card {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
            min-height: 68px;
        }

        .user-card:hover {
            background: #fafafa;
        }

        .avatar-link {
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .name-link {
            font-weight: 600;
            font-size: 14px;
            color: #262626;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .name-link:hover {
            text-decoration: underline;
        }

        .user-fullname {
            font-size: 13px;
            color: #8e8e8e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .btn-follow {
            background: #0095f6;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-follow:hover {
            background: #1877f2;
        }

        .btn-follow.following {
            background: #efefef;
            color: #262626;
        }

        .btn-follow.following:hover {
            background: #dbdbdb;
        }

        .btn-chat {
            background: #efefef;
            color: #262626;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-chat:hover {
            background: #dbdbdb;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #8e8e8e;
            font-size: 14px;
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            color: #dbdbdb;
        }

        @media (max-width: 600px) {
            .list {
                grid-template-columns: 1fr;
            }

            .btn-chat span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="vertical-nav" aria-label="Điều hướng chính">
        <a href="/post/post.html">🏠 Bài đăng</a>
        <a href="/user/profile.html">👤 Trang cá nhân</a>
        <a href="/friends.html" class="active">👥 Bạn bè</a>
        <a href="/chat.html">💬 Tin nhắn</a>
        <a href="/post/addpost.html">✍️ Tạo bài đăng</a>
    </nav>

    <div class="container content-with-nav">
        <div class="page-header">
            <h1>Những người bạn đã theo dõi</h1>
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm...">
            </div>
        </div>
        <div id="usersList" class="list">Đang tải...</div>
    </div>

    <script src="/js/friends.js"></script>
</body>

</html>
