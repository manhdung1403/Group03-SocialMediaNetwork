<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat - NewsFeed</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #fafafa;
            --panel: #ffffff;
            --muted: #8e8e8e;
            --accent: #0095f6;
            --bubble: #efefef;
            --reply-border: var(--accent);
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #262626;
            font-family: Inter, system-ui, Arial;
        }

        .app {
            max-width: 1100px;
            margin: 24px auto;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 1px 4px rgba(0,0,0,.15);
            border: 1px solid #dbdbdb;
            height: calc(100vh - 48px);
        }

        .sidebar {
            width: 320px;
            background: var(--panel);
            border-right: 1px solid #dbdbdb;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .search {
            display: flex;
            gap: 8px;
        }

        .search input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #efefef;
            color: #262626;
        }

        .conversations {
            overflow: auto;
            flex: 1;
        }

        .conv {
            padding: 10px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
            cursor: pointer;
        }

        .conv:hover {
            background: #fafafa;
        }

        .conv.active {
            background: #efefef;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            font-size: 18px;
            color: #fff;
        }

        .avatar.group {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
        }

        .conv .meta {
            flex: 1;
        }

        .conv .meta .name {
            font-weight: 600;
            color: #262626;
        }

        .badge {
            background: #ed4956;
            color: white;
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 12px;
        }

        .chat-window {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .chat-main {
            flex: 1;
            padding: 16px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* ── Message wrapper for hover actions ── */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            position: relative;
        }

        .msg-row.me {
            flex-direction: row-reverse;
        }

        .msg {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            background: #efefef;
            color: #262626;
            position: relative;
            word-break: break-word;
        }

        .msg-row.me .msg {
            background: #3897f0;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.me .msg .meta {
            color: rgba(255,255,255,0.75);
        }

        .msg-row:not(.me) .msg {
            border-bottom-left-radius: 4px;
        }

        .msg .meta {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .msg img.inline-image {
            display: block;
            max-width: 320px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* ── Reply quote inside bubble ── */
        .reply-quote {
            background: rgba(0,0,0,0.07);
            border-left: 3px solid var(--accent);
            padding: 5px 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
        }

        .reply-quote .rq-name {
            font-weight: 700;
            color: var(--accent);
            font-size: 11px;
            margin-bottom: 2px;
        }

        /* ── Emoji reactions on message ── */
        .msg-reactions {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin-top: 5px;
        }

        .reaction-chip {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 999px;
            padding: 2px 7px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .reaction-chip:hover {
            background: #f0f0f0;
        }

        .reaction-chip .rc-count {
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Hover action bar ── */
        .msg-actions {
            display: none;
            align-items: center;
            gap: 4px;
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 999px;
            padding: 3px 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
            position: absolute;
            top: -36px;
            z-index: 100;
            white-space: nowrap;
        }

        .msg-row.me .msg-actions {
            right: 8px;
        }

        .msg-row:not(.me) .msg-actions {
            left: 8px;
        }

        .msg-row:hover .msg-actions {
            display: flex;
        }

        .act-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #8e8e8e;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
        }

        .act-btn:hover {
            background: #efefef;
            color: #262626;
        }

        /* Quick emoji picker */
        .quick-emoji-picker {
            display: none;
            position: absolute;
            z-index: 9999;
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 999px;
            padding: 5px 10px;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,.12);
            top: -74px;
        }

        .msg-row.me .quick-emoji-picker {
            right: 8px;
        }

        .msg-row:not(.me) .quick-emoji-picker {
            left: 8px;
        }

        .quick-emoji-picker.open {
            display: flex;
        }

        .qe-btn {
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.15s;
        }

        .qe-btn:hover {
            transform: scale(1.3);
            background: #efefef;
        }

        /* ── Reply bar above input ── */
        #replyBar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #f7f7f7;
            border-top: 1px solid #dbdbdb;
            border-left: 3px solid var(--accent);
        }

        #replyBar .rb-content {
            flex: 1;
        }

        #replyBar .rb-label {
            font-size: 11px;
            color: var(--accent);
            font-weight: 700;
        }

        #replyBar .rb-text {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        #replyBar .rb-close {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
        }

        #replyBar .rb-close:hover {
            color: #262626;
        }

        .input-bar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-top: 1px solid #dbdbdb;
            gap: 8px;
            background: #fff;
        }

        .input-bar input[type=text] {
            flex: 1;
            padding: 10px 14px;
            border-radius: 22px;
            border: 1px solid #dbdbdb;
            background: #fafafa;
            color: #262626;
        }

        .input-bar input[type=text]:focus {
            outline: none;
            border-color: #a8a8a8;
            background: #fff;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-ghost {
            background: #efefef;
            color: #262626;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-ghost:hover {
            background: #dbdbdb;
        }

        .small {
            font-size: 12px;
            color: var(--muted);
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #34d399;
            display: inline-block;
        }

        /* ── Image modal ── */
        #imageModal {
            position: fixed;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }

        #imageModal .modal-content {
            background: transparent;
            max-width: 66vw;
            max-height: 80vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #imageModal img.modal-image {
            max-width: 100%;
            max-height: 100%;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        #imageModal .close-btn {
            position: absolute;
            right: -12px;
            top: -12px;
            background: #fff;
            color: #262626;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #dbdbdb;
            font-size: 18px;
        }

        /* ── Placeholder ── */
        .no-conv-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            font-size: 18px;
            text-align: center;
            padding: 24px;
        }

        /* ── Conversation menu ── */
        .conv-menu {
            position: absolute;
            right: 0;
            top: 40px;
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,.12);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }

        .conv-menu .btn {
            padding: 8px;
            text-align: left;
        }

        /* ──────────────────────────────────────
           GROUP CREATION MODAL
        ────────────────────────────────────── */
        .overlay-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            backdrop-filter: blur(2px);
        }

        .modal-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 14px;
            padding: 24px;
            width: 420px;
            max-width: 95vw;
            box-shadow: 0 4px 24px rgba(0,0,0,.15);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .modal-box h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #262626;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-box h3 i {
            color: var(--accent);
        }

        .modal-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #dbdbdb;
            background: #fafafa;
            color: #262626;
            font-size: 14px;
            box-sizing: border-box;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
        }

        .contact-list-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 240px;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .contact-item:hover {
            background: #fafafa;
        }

        .contact-item input[type=checkbox] {
            width: 17px;
            height: 17px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .contact-item .c-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f97316, #ef4444);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
        }

        .contact-item .c-name {
            font-weight: 600;
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 28px;
        }

        .tag {
            background: #e8f4fd;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tag .tag-x {
            cursor: pointer;
            opacity: 0.7;
        }

        .tag .tag-x:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <nav class="vertical-nav" aria-label="Điều hướng chính">
        <a href="/post/post.html">🏠 Bài đăng</a>
        <a href="/user/profile.html">👤 Trang cá nhân</a>
        <a href="/friends.html">👥 Bạn bè</a>
        <a href="/chat.html" class="active">💬 Tin nhắn</a>
        <a href="/post/addpost.html">✍️ Tạo bài đăng</a>
    </nav>
    <div class="app content-with-nav">
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="font-weight:700;color:#262626">Tin nhắn</div>
                <button id="createGroupOpenBtn" class="btn"
                    style="font-size:12px;padding:5px 10px;display:flex;align-items:center;gap:5px">
                    <i class="fa-solid fa-users"></i> Tạo nhóm
                </button>
            </div>
            <div class="search">
                <input id="searchConvs" placeholder="Tìm hội thoại hoặc tin...">
                <button id="newConv" class="btn">Mới</button>
            </div>
            <div class="conversations" id="conversations"></div>
        </div>

        <!-- Chat window -->
        <div class="chat-window">
            <div class="chat-header">
                <div>
                    <div id="chatTitle" style="font-weight:700">Chọn cuộc trò chuyện</div>
                    <div id="chatStatus" class="small">—</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <input id="searchInConv" placeholder="Tìm trong hội thoại"
                        style="padding:6px 10px;border-radius:8px;border:1px solid #dbdbdb;background:#fafafa;color:#262626">
                    <div style="position:relative">
                        <button id="convMenuBtn" class="btn" title="Tùy chọn"><i
                                class="fa-solid fa-ellipsis"></i></button>
                        <div id="convMenu" class="conv-menu" style="display:none">
                            <button id="deleteConvBtn" class="btn" style="background:#ef4444;color:#fff">Xóa cuộc trò
                                chuyện</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="messages" class="chat-main"></div>

            <!-- Reply bar -->
            <div id="replyBar">
                <div class="rb-content">
                    <div class="rb-label"><i class="fa-solid fa-reply"></i> Đang trả lời <span id="replyToName"></span>
                    </div>
                    <div class="rb-text" id="replyToText"></div>
                </div>
                <button class="rb-close" id="cancelReplyBtn">×</button>
            </div>

            <div class="input-bar">
                <input type="file" id="imageInput" accept="image/*" style="display:none">
                <button id="attachBtn" class="btn"><i class="fa-solid fa-camera"></i></button>
                <button id="emojiBtn" class="btn"><i class="fa-regular fa-face-smile"></i></button>
                <input id="messageInput" type="text" placeholder="Nhập tin nhắn...">
                <button id="sendBtn" class="btn" type="button"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Image modal -->
    <div id="imageModal">
        <div class="modal-content">
            <div class="close-btn" id="imageModalClose">×</div>
            <img id="imageModalImg" class="modal-image" src="" alt="">
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="overlay-modal" style="display:none">
        <div class="modal-box">
            <h3><i class="fa-solid fa-users"></i> Tạo nhóm mới</h3>

            <div>
                <input id="groupNameInput" class="modal-input" placeholder="Tên nhóm (ví dụ: Team dự án A)...">
            </div>

            <div>
                <div class="contact-list-label" style="margin-bottom:8px">Thêm thành viên</div>
                <div class="selected-tags" id="selectedTags"></div>
            </div>

            <div class="contact-list" id="groupContactList">
                <!-- filled by JS -->
            </div>

            <div class="modal-actions">
                <button id="cancelGroupBtn" class="btn-ghost">Hủy</button>
                <button id="createGroupBtn" class="btn"><i class="fa-solid fa-plus"></i> Tạo nhóm</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/chat.js"></script>
</body>

</html>
